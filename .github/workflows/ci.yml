name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build and unit test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore app/CrowdDiscussesAlternatives.slnx

      - name: Build
        run: dotnet build app/CrowdDiscussesAlternatives.slnx --no-restore --configuration Release

      # Unit tests only. Integration tests need a database and are run locally by the
      # developer — see the note below and Documentation/devplan.md section 2.1.
      - name: Unit tests
        run: >
          dotnet test app/tests/CDA.UnitTests/CDA.UnitTests.csproj
          --no-build --configuration Release --verbosity normal

# Integration tests deliberately do not run here.
#
# They need a disposable database. The shared development server is not an option —
# concurrent runs would truncate each other's tables — and the maintainer has chosen not
# to run a MariaDB service container in CI either. So they run locally:
#
#   dotnet test app/tests/CDA.IntegrationTests
#
# The consequence is that the SQL-heavy parts of this codebase — ranking, keyset
# pagination, full-text search — are only covered on a developer's machine. Nothing stops
# a pull request that breaks them from going green here. Worth revisiting once those
# features exist and the suite is large enough for that gap to bite.
